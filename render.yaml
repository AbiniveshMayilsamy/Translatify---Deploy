services:
  - type: web
    name: translatify-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k eventlet --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: WHISPER_MODEL
        value: base
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
